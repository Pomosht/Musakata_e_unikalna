<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Zero Left Quiz</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.quiz-box {
    background: white;
    width: 60%;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
}

button {
    display: block;
    width: 80%;
    margin: 10px auto;
    padding: 10px;
    cursor: pointer;
}

.correct { background: lightgreen; }
.wrong { background: lightcoral; }
</style>
</head>

<body>

<div class="quiz-box">
    <h2 id="question">Въпрос</h2>
    <div id="answers"></div>
    <p id="score"></p>
</div>

<script>
let quiz = [
{
q: "Колко храна се изхвърля ежедневно?",
a: ["Много малко", "Тонове", "Никаква", "Само плодове"],
correct: 1
},
{
q: "Какво означава 'Zero Left'?",
a: ["Повече храна", "Без отпадък", "Само вода", "Само енергия"],
correct: 1
},
{
q: "Как можем да намалим отпадъка?",
a: ["Да изхвърляме повече", "Да планираме храната", "Да купуваме излишно", "Да не готвим"],
correct: 1
},
{
q: "Какво пестим с Zero Left?",
a: ["Време", "Пари", "Ресурси", "Всички"],
correct: 3
},
{
q: "Кое е пример за устойчиво действие?",
a: ["Изхвърляне на храна", "Рециклиране", "Разхищение", "Прекомерно купуване"],
correct: 1
},
{
q: "Какво е основен проблем?",
a: ["Недостиг на отпадък", "Разхищение", "Прекалено чистота", "Няма проблем"],
correct: 1
},
{
q: "Какво може да помогне?",
a: ["Технологии", "Игнориране", "Повече отпадък", "Без действия"],
correct: 0
},
{
q: "Какво се пести с вода?",
a: ["Енергия", "Пари", "Природа", "Всички"],
correct: 3
},
{
q: "Кое НЕ е правилно?",
a: ["Пестене на вода", "Планиране", "Изхвърляне", "Използване на остатъци"],
correct: 2
},
{
q: "Какво е целта?",
a: ["Повече отпадък", "Нищо", "Устойчив живот", "Хаос"],
correct: 2
}
];

let current = 0;
let score = 0;

function loadQuestion() {
    let q = quiz[current];
    document.getElementById("question").innerText = q.q;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach((answer, index) => {
        let btn = document.createElement("button");
        btn.innerText = answer;

        btn.onclick = () => {
            if (index === q.correct) {
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
            }

            setTimeout(() => {
                current++;
                if (current < quiz.length) {
                    loadQuestion();
                } else {
                    document.getElementById("question").innerText = "Край!";
                    answersDiv.innerHTML = "";
                    document.getElementById("score").innerText =
                        "Точки: " + score + "/10";
                }
            }, 800);
        };

        answersDiv.appendChild(btn);
    });
}

loadQuestion();
</script>

</body>
</html>
